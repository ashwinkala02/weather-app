<!doctype html>
<html>
  <head>
    <title>Popular Cities Weather</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <nav class="navbar">
      <h2 class="logo">Weather App</h2>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="cities.html">Cities</a></li>
        <li><a href="favorite.html">Favorites</a></li>
      </ul>
    </nav>

    <h2 class="cities-title">Popular Cities</h2>

    <div class="cities-grid">
      <!-- Delhi -->
      <div class="city-card" id="Delhi">
        <img src="images/delhi.jpg" class="city-img" />

        <div class="city-top">
          <h3>Delhi</h3>
        </div>

        <div class="city-bottom">
          <img id="iconDelhi" />
          <h2 id="tempDelhi">--°C</h2>
          <p id="condDelhi">--</p>
        </div>
      </div>

      <!-- Mumbai -->
      <div class="city-card" id="Mumbai">
        <img src="images/mumbai.jpg" class="city-img" />

        <div class="city-top">
          <h3>Mumbai</h3>
        </div>

        <div class="city-bottom">
          <img id="iconMumbai" />
          <h2 id="tempMumbai">--°C</h2>
          <p id="condMumbai">--</p>
        </div>
      </div>

      <!-- Hyderabad -->
      <div class="city-card" id="Hyderabad">
        <img src="images/hyderabad.jpg" class="city-img" />

        <div class="city-top">
          <h3>Hyderabad</h3>
        </div>

        <div class="city-bottom">
          <img id="iconHyderabad" />
          <h2 id="tempHyderabad">--°C</h2>
          <p id="condHyderabad">--</p>
        </div>
      </div>

      <!-- Bengaluru -->
      <div class="city-card" id="Bengaluru">
        <img src="images/bengaluru.jpg" class="city-img" />

        <div class="city-top">
          <h3>Bengaluru</h3>
        </div>

        <div class="city-bottom">
          <img id="iconBengaluru" />
          <h2 id="tempBengaluru">--°C</h2>
          <p id="condBengaluru">--</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
